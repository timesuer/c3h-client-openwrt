name: Build c3h-client for armv7 musl

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install musl cross toolchain
        run: |
          wget -q https://musl.cc/arm-linux-musleabihf-cross.tgz
          tar -xzf arm-linux-musleabihf-cross.tgz
          echo "$PWD/arm-linux-musleabihf-cross/bin" >> $GITHUB_PATH

      - name: Install libpcap armhf
        run: |
          sudo dpkg --add-architecture armhf
          sudo apt update
          sudo apt install -y libpcap-dev:armhf

      - name: Build
        run: |
          cd src
          arm-linux-musleabihf-gcc -o c3h-client main.c auth.c adapter.c md5.c \
            -lpcap -L/usr/lib/arm-linux-gnueabihf

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: c3h-client-armv7-musl
          path: src/c3h-client

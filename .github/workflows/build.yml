name: Build c3h-client for armv7

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain and dependencies
        run: |
          sudo dpkg --add-architecture armhf
          sudo apt update
          sudo apt install -y gcc-arm-linux-gnueabihf libpcap-dev:armhf

      - name: Build
        run: |
          cd src
          arm-linux-gnueabihf-gcc -o c3h-client main.c auth.c adapter.c md5.c \
            -lpcap -L/usr/lib/arm-linux-gnueabihf

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: c3h-client-armv7
          path: src/c3h-client

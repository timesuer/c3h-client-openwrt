name: Build c3h-client for armv7

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt update
          sudo apt install -y gcc-arm-linux-gnueabihf flex bison wget

      - name: Build libpcap from source for armv7
        run: |
          cd /tmp
          wget https://www.tcpdump.org/release/libpcap-1.10.4.tar.gz
          tar -xzf libpcap-1.10.4.tar.gz
          cd libpcap-1.10.4
          ./configure --host=arm-linux-gnueabihf \
            CC=arm-linux-gnueabihf-gcc \
            --disable-dbus \
            --disable-rdma \
            --disable-shared \
            --enable-static \
            --without-libnl
          make -j$(nproc)
          ls -la libpcap.a

      - name: Build c3h-client (static)
        run: |
          cd src
          arm-linux-gnueabihf-gcc -static -o c3h-client \
            main.c auth.c adapter.c md5.c \
            -I/tmp/libpcap-1.10.4 \
            /tmp/libpcap-1.10.4/libpcap.a

      - name: Verify binary
        run: |
          file src/c3h-client
          arm-linux-gnueabihf-readelf -d src/c3h-client || echo "No dynamic section (good, static)"
          ls -lh src/c3h-client

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: c3h-client-armv7-static
          path: src/c3h-client
